name: NAV diario + Dashboard

on:
  schedule:
    - cron: "15 6 * * 1-5"
  workflow_dispatch:

jobs:
  nav-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: pip install requests pandas
      - name: Ejecutar sistema
        run: python nav_check.py
      - name: Commit histórico y latest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/nav_history.csv data/latest.json
          git diff --staged --quiet || git commit -m "Actualizar NAV y dashboard"
          git push
