<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema Rotación Cartera</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
    }

    header {
      padding: 20px;
      background: #020617;
      border-bottom: 1px solid #1e293b;
    }

    h1 {
      margin: 0;
      font-size: 22px;
    }

    main {
      padding: 20px;
      display: grid;
      gap: 20px;
    }

    .grid {
      display: grid;
      gap: 15px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .card {
      background: #020617;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #1e293b;
    }

    .label {
      font-size: 12px;
      color: #94a3b8;
    }

    .value {
      font-size: 20px;
      font-weight: bold;
      margin-top: 5px;
    }

    .small {
      font-size: 12px;
      color: #64748b;
    }

    .bar {
      height: 10px;
      background: #1e293b;
      border-radius: 5px;
      overflow: hidden;
      margin-top: 6px;
    }

    .fill {
      height: 100%;
      background: #22c55e;
    }

    .section-title {
      font-size: 16px;
      margin-bottom: 10px;
    }

  </style>
</head>

<body>

<header>
  <h1>Sistema de Rotación de Cartera</h1>
</header>

<main>

  <!-- KPI -->
  <section class="grid">
    <div class="card">
      <div class="label">Escenario</div>
      <div class="value" id="scenario">—</div>
    </div>

    <div class="card">
      <div class="label">Acción</div>
      <div class="value" id="signal">—</div>
    </div>

    <div class="card">
      <div class="label">Siguiente trigger</div>
      <div class="value" id="trigger">—</div>
    </div>

    <div class="card">
      <div class="label">Actualización</div>
      <div class="value small" id="timestamp">—</div>
    </div>
  </section>

  <!-- Asignación -->
  <section>
    <div class="section-title">Asignación objetivo</div>

    <div class="card">
      <div class="label">Renta Variable</div>
      <div class="bar"><div id="rvBar" class="fill"></div></div>
      <div class="small" id="rvText"></div>

      <div class="label">Bonos</div>
      <div class="bar"><div id="bondsBar" class="fill"></div></div>
      <div class="small" id="bondsText"></div>

      <div class="label">Liquidez</div>
      <div class="bar"><div id="cashBar" class="fill"></div></div>
      <div class="small" id="cashText"></div>

      <div class="label">Oro</div>
      <div class="bar"><div id="goldBar" class="fill"></div></div>
      <div class="small" id="goldText"></div>
    </div>
  </section>

</main>

<script>
async function loadData() {
  try {
    const res = await fetch("data/latest.json");
    const data = await res.json();

    // KPIs
    document.getElementById("scenario").textContent = data.scenario;
    document.getElementById("signal").textContent = data.signal;
    document.getElementById("trigger").textContent = data.next_trigger;

    const date = new Date(data.timestamp);
    document.getElementById("timestamp").textContent = date.toLocaleString();

    // Asignación
    const alloc = data.target_allocation;

    setBar("rv", alloc.equity);
    setBar("bonds", alloc.bonds);
    setBar("cash", alloc.cash);
    setBar("gold", alloc.gold);

  } catch (e) {
    console.error("Error cargando datos", e);
  }
}

function setBar(name, value) {
  document.getElementById(name + "Bar").style.width = value + "%";
  document.getElementById(name + "Text").textContent = value + "%";
}

loadData();
</script>

</body>
</html>
