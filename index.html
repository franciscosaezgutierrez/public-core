<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard Rotación</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<h1>Dashboard Sistema de Rotación</h1>

<div class="grid">

  <!-- ESCENARIO -->
  <section class="card">
    <h2>Escenario</h2>
    <div id="scenario">—</div>
    <div id="signal">—</div>
  </section>

  <!-- VALIDACIÓN -->
  <section class="card">
    <h2>Validación del sistema</h2>
    <div id="limitsStatus">—</div>
    <div id="limitsIssues">—</div>
  </section>

  <!-- EXPLICACIÓN -->
  <section class="card">
    <h2>Por qué este escenario</h2>
    <div id="why"></div>
  </section>

  <!-- FRESCURA -->
  <section class="card">
    <h2>Frescura de datos</h2>
    <div id="freshness"></div>
  </section>

  <!-- ROTACIÓN -->
  <section class="card">
    <h2>Rotación</h2>
    <label>DWS (€)</label>
    <input id="dws" type="number" value="5000">

    <label>DNCA (€)</label>
    <input id="dnca" type="number" value="5000">

    <label>Liquidez mínima (€)</label>
    <input id="minCash" type="number" value="2000">

    <button onclick="runRotation()">Calcular</button>

    <div id="rotationResult"></div>
  </section>

</div>

<script src="app.js"></script>
</body>
</html>
