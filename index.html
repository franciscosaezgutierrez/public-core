<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Rotación</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Sistema de Rotación</h1>

<div class="grid">

<section class="card">
<h2>Escenario</h2>
<div id="scenario">—</div>
<div id="signal">—</div>
</section>

<section class="card">
<h2>Validación del sistema</h2>
<div id="limitsStatus">—</div>
<div id="limitsIssues">—</div>
</section>

<section class="card">
<h2>Por qué este escenario</h2>
<div id="why"></div>
</section>

<section class="card">
<h2>Rotación por caída</h2>

<label>DWS (€)</label>
<input id="rotationDwsInput" type="number" value="5000">

<label>DNCA (€)</label>
<input id="rotationDncaInput" type="number" value="5000">

<label>Liquidez mínima (€)</label>
<input id="rotationMinCashInput" type="number" value="2000">

<button onclick="runRotation()">Calcular</button>

<div id="rotationOutput">—</div>

</section>

</div>

<script src="app.js"></script>
</body>
</html>
